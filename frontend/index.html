<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Uptime Monitor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2e3a;
    --text: #e6e8ee;
    --muted: #8b8fa3;
    --up: #34d399;
    --down: #f87171;
    --accent: #6366f1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px 16px;
  }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 4px; }
  p.subtitle { color: var(--muted); margin-top: 0; margin-bottom: 24px; }

  form {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  input {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
  }
  input[name="name"] { flex: 1; min-width: 140px; }
  input[name="url"] { flex: 2; min-width: 220px; }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
  }
  button:hover { opacity: 0.9; }
  button.danger { background: transparent; color: var(--down); padding: 6px 10px; font-weight: 400; }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
  th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600;
  }
  .badge.up { background: rgba(52,211,153,0.15); color: var(--up); }
  .badge.down { background: rgba(248,113,113,0.15); color: var(--down); }
  .badge.pending { background: rgba(139,143,163,0.15); color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

  .empty { color: var(--muted); text-align: center; padding: 40px 0; }
  .footer { margin-top: 16px; color: var(--muted); font-size: 12px; }
  .error-banner {
    background: rgba(248,113,113,0.15); color: var(--down);
    padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>📡 Uptime Monitor</h1>
    <p class="subtitle">Auto-refreshes every 5 seconds. Backend checks each URL on its own schedule.</p>

    <div id="errorBanner" class="error-banner"></div>

    <form id="addForm">
      <input type="text" name="name" placeholder="Label (optional)" />
      <input type="text" name="url" placeholder="https://example.com" required />
      <button type="submit">Add URL</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>URL</th>
          <th>Status</th>
          <th>HTTP Code</th>
          <th>Response Time</th>
          <th>Last Checked</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="urlTableBody"></tbody>
    </table>
    <div id="emptyState" class="empty" style="display:none;">No URLs yet — add one above to start monitoring.</div>

    <div class="footer">API base: <span id="apiBaseLabel"></span></div>
  </div>

<script>
  // Backend is reachable from the browser at this host/port (mapped via docker-compose).
  const API_BASE = window.API_BASE_URL || 'http://localhost:4000';
  document.getElementById('apiBaseLabel').textContent = API_BASE;

  const tbody = document.getElementById('urlTableBody');
  const emptyState = document.getElementById('emptyState');
  const errorBanner = document.getElementById('errorBanner');
  const form = document.getElementById('addForm');

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.style.display = 'block';
  }
  function clearError() {
    errorBanner.style.display = 'none';
  }

  function timeAgo(isoString) {
    if (!isoString) return '—';
    const diffMs = Date.now() - new Date(isoString + 'Z').getTime();
    const sec = Math.round(diffMs / 1000);
    if (sec < 60) return sec + 's ago';
    const min = Math.round(sec / 60);
    if (min < 60) return min + 'm ago';
    const hr = Math.round(min / 60);
    return hr + 'h ago';
  }

  function renderRow(item) {
    const lc = item.latest_check;
    let badge = '<span class="badge pending"><span class="dot"></span>pending</span>';
    let code = '—', rt = '—', when = '—';

    if (lc) {
      if (lc.is_up) {
        badge = '<span class="badge up"><span class="dot"></span>UP</span>';
      } else {
        badge = '<span class="badge down"><span class="dot"></span>DOWN</span>';
      }
      code = lc.status_code ?? 'N/A';
      rt = lc.response_time_ms != null ? lc.response_time_ms + ' ms' : '—';
      when = timeAgo(lc.checked_at);
    }

    return `
      <tr>
        <td>${item.name || '(unnamed)'}</td>
        <td><a href="${item.url}" target="_blank" rel="noopener" style="color:#8b8fa3">${item.url}</a></td>
        <td>${badge}</td>
        <td>${code}</td>
        <td>${rt}</td>
        <td>${when}</td>
        <td><button class="danger" onclick="deleteUrl(${item.id})">remove</button></td>
      </tr>
    `;
  }

  async function loadUrls() {
    try {
      const res = await fetch(`${API_BASE}/api/urls`);
      if (!res.ok) throw new Error('Failed to fetch URLs');
      const data = await res.json();
      clearError();

      if (data.length === 0) {
        tbody.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }
      emptyState.style.display = 'none';
      tbody.innerHTML = data.map(renderRow).join('');
    } catch (err) {
      showError('Could not reach backend API at ' + API_BASE + '. Is it running?');
    }
  }

  async function deleteUrl(id) {
    await fetch(`${API_BASE}/api/urls/${id}`, { method: 'DELETE' });
    loadUrls();
  }
  window.deleteUrl = deleteUrl;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(form);
    const url = formData.get('url').trim();
    const name = formData.get('name').trim();

    try {
      const res = await fetch(`${API_BASE}/api/urls`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, name }),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Failed to add URL');
      }
      form.reset();
      loadUrls();
    } catch (err) {
      showError(err.message);
    }
  });

  loadUrls();
  setInterval(loadUrls, 5000);
</script>
</body>
</html>
